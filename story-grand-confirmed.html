<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>通关隐藏版 · 4×6 一屏</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #12121a; color: #f0ebe3; font-family: system-ui, sans-serif; }
    .page {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) 6px env(safe-area-inset-bottom) 6px;
    }
    header {
      flex: 0 0 auto;
      text-align: center;
      padding: 4px 8px 6px;
      font-size: 0.72rem;
      line-height: 1.35;
      opacity: 0.9;
    }
    header h1 { font-size: 0.85rem; font-weight: 600; margin-bottom: 2px; }
    .axis-hint { display: flex; justify-content: space-between; padding: 0 4px 4px; font-size: 0.62rem; opacity: 0.75; }
    .col-labels {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 3px;
      padding: 0 3px 3px;
      font-size: 0.65rem;
      text-align: center;
      color: #c9b896;
    }
    .board-wrap {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 0 3px;
    }
    .row-tag {
      flex: 0 0 auto;
      font-size: 0.58rem;
      opacity: 0.55;
      padding: 2px 2px 1px;
    }
    .grid {
      flex: 1 1 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: 3px;
      min-height: 0;
    }
    .grid img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 3px;
      background: #1e1e28;
    }
    footer {
      flex: 0 0 auto;
      text-align: center;
      font-size: 0.6rem;
      opacity: 0.5;
      padding-top: 4px;
    }
    a { color: #8ec8ff; }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>通关隐藏版 · 4×6（一屏）</h1>
      <div>上北下南 · 左→右 春夏秋冬 · <a href="index.html">App</a></div>
    </header>
    <div class="axis-hint">
      <span>↑ 北</span>
      <span>南 ↓</span>
    </div>
    <div class="col-labels">
      <span>春</span><span>夏</span><span>秋</span><span>冬</span>
    </div>
    <div class="board-wrap">
      <div class="grid" id="board"></div>
    </div>
    <footer>合成 assets/story/egg-grand.webp</footer>
  </div>
  <script src="js/data/grand-finale-cards.js"></script>
  <script>
    const board = document.getElementById("board");
    const slate = window.GRAND_SLATE || [];
    for (let row = 0; row < slate.length; row++) {
      for (let col = 0; col < slate[row].length; col++) {
        const id = slate[row][col];
        const img = document.createElement("img");
        const n = String(id).padStart(2, "0");
        img.src = `assets/story/grand/card-${n}-clean.png?v=4`;
        img.alt = `卡${id}`;
        img.title = `${["春","夏","秋","冬"][col]} · 卡${id}`;
        board.appendChild(img);
      }
    }
  </script>
</body>
</html>
