<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#FF8A80" />
  <meta name="description" content="标日第14/16/18课课后巩固：语法网络、情景对话、快速测试" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="标日课后巩固 · 第14/16/18课" />
  <meta property="og:description" content="10分钟课后巩固：串语法、练对话、测考点。微信点开链接即可用，无需安装。" />
  <meta property="og:image" content="icons/icon.svg" />
  <title>标日课后巩固 · 14/16/18课</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/mvp.css?v=2" />
</head>
<body class="mvp-app">
  <div id="app">
    <header class="top-bar">
      <h1 id="page-title">标日课后巩固</h1>
      <div class="top-actions">
        <button type="button" class="icon-btn" id="btn-share-wechat" aria-label="分享到微信">📤</button>
        <a href="share.html" class="icon-btn" aria-label="分享页" style="text-decoration:none;font-size:14px">⎙</a>
      </div>
    </header>

    <main id="main-content">
      <section id="view-home" class="view active">
        <div class="mvp-hero">
          <h2>こんにちは！课后 10 分钟</h2>
          <p>串语法 · 练对话 · 测考点 — 第 14 / 16 / 18 课</p>
          <p id="home-week-count" style="margin-top:8px;font-size:13px">本周已学 0 天</p>
        </div>
        <div id="lesson-cards"></div>
      </section>

      <section id="view-lesson" class="view">
        <div id="lesson-flow-head"></div>
        <div id="gate-tabs" class="gate-tabs"></div>
        <div id="lesson-flow-body"></div>
      </section>

      <section id="view-review" class="view">
        <p class="hint">错题在第 1、3、7 天提醒复习（不发微信通知）</p>
        <p class="hint" id="review-empty" hidden>暂无待复习错题 🎉</p>
        <ul id="review-list" style="list-style:none;padding:0"></ul>
      </section>

      <section id="view-me" class="view">
        <h3 class="section-title">近 7 天学习</h3>
        <div class="heatmap" id="heatmap"></div>
        <h3 class="section-title">课程进度（三关）</h3>
        <div id="parent-progress"></div>
        <h3 class="section-title">薄弱知识点 TOP3</h3>
        <ul id="weak-top3" style="padding-left:18px"></ul>
        <button type="button" class="btn ghost" id="btn-clear-mvp" style="margin-top:20px;width:100%">清空本机学习记录</button>
        <button type="button" class="btn primary" id="btn-share-me" style="width:100%;margin-top:12px">📤 复制链接 · 发到微信</button>
        <a href="share.html" class="btn secondary" style="display:block;text-align:center;margin-top:10px;text-decoration:none">分享页（二维码）</a>
        <p class="hint footer-hint" style="margin-top:12px">纯前端离线可用 · 无登录 · 无 AI 评分</p>
        <a href="legacy.html" class="btn ghost" style="display:block;text-align:center;margin-top:10px;text-decoration:none">打开旧版 24 课情景互动</a>
      </section>
    </main>

    <div id="review-modal" class="gn-modal" hidden></div>

    <nav class="bottom-nav" aria-label="主导航">
      <button type="button" class="nav-item active" data-view="home">
        <span class="nav-icon">🏠</span><span>首页</span>
      </button>
      <button type="button" class="nav-item" data-view="review">
        <span class="nav-icon">📝</span><span>复习</span>
        <span class="nav-badge" id="review-badge" hidden>0</span>
      </button>
      <button type="button" class="nav-item" data-view="me">
        <span class="nav-icon">👤</span><span>我的</span>
      </button>
    </nav>
  </div>

  <script src="js/data/lessons-mvp.js"></script>
  <script src="js/ruby-render.js"></script>
  <script src="js/mvp-storage.js"></script>
  <script src="js/speech-engine.js"></script>
  <script src="js/grammar-network.js"></script>
  <script src="js/dialogue-gate.js"></script>
  <script src="js/quiz-gate.js"></script>
  <script src="js/share-wechat.js"></script>
  <script src="js/app.js"></script>
  <script>
    ShareWechat.mountButton(document.getElementById("btn-share-wechat"));
    ShareWechat.mountButton(document.getElementById("btn-share-me"));
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js").catch(() => {});
  </script>
</body>
</html>
