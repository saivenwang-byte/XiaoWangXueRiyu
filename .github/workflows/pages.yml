# v2 公网发布：push main → 自动更新 gh-pages 分支
# 你必须在 GitHub 做一次（否则永远 404）：
#   Settings → Pages → Source: Deploy from a branch
#   Branch: gh-pages  或  main   Folder: / (root)  → Save
# 不要选「GitHub Actions」（否则会走 configure-pages 并报 Resource not accessible）
#
# 学员链接：https://saivenwang-byte.github.io/XiaoWangXueRiyu-v2/index.html?v=314

name: Publish to gh-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site
        run: touch .nojekyll

      - name: Push to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: true
          single-commit: true
          commit-message: "deploy: GitHub Pages from main @ ${{ github.sha }}"
