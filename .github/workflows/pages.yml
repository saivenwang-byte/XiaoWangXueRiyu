# v2 新仓：用 gh-pages 分支发布（不依赖 configure-pages，避免新仓 17s 失败）
# 仓库 Settings → Pages → Source: Deploy from branch → gh-pages → / (root)

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-gh-branch
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          touch .nojekyll
          echo "deploy-v2-$(date -u +%Y%m%d%H%M%S)" > build-id.txt

      - name: Publish to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: true
          single-commit: true
          commit-message: "deploy: GitHub Pages from main"
