# v2 公网：不要用本工作流里的「GitHub Actions + configure-pages」（会 17 秒失败）。
# 正确做法（一次即可）：
#   仓库 Settings → Pages → Deploy from a branch → main → / (root) → Save
# 学员链接：https://saivenwang-byte.github.io/XiaoWangXueRiyu-v2/index.html?v=314
#
# 下面仅保留「手动同步 gh-pages」；日常 push main 后只要 Pages 指向 main 即可，不必跑 Actions。

name: Sync gh-pages (manual only)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: touch .nojekyll
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: true
          single-commit: true
          commit-message: "deploy: manual gh-pages sync"
