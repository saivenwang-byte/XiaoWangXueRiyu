# GitHub Pages · 官方 Actions 部署（与 Settings → GitHub Actions 来源匹配）
# 首次开通：Settings → Pages → Source 选 GitHub Actions → 选本 workflow → Save
# 或改用分支：Source → Deploy from branch → gh-pages 或 main → / (root)
#
# Settings → Actions → General → Workflow permissions → Read and write permissions
#
# 学员链接：https://saivenwang-byte.github.io/XiaoWangXueRiyu-v2/index.html?v=314

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: touch .nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
