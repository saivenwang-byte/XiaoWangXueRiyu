<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#FF8A80" />
  <title>日语初级课后练习 · H5</title>
  <link rel="stylesheet" href="../../css/app.css" />
  <link rel="stylesheet" href="../../css/mvp.css" />
</head>
<body class="mvp-app">
  <div id="app">
    <header class="top-bar"><h1 id="page-title">日语初级课后练习</h1></header>
    <main id="main-content">
      <section id="view-home" class="view active">
        <div class="mvp-hero">
          <h2>こんにちは！课后 10 分钟</h2>
          <p>与主项目 PRD 三关一致（H5 壳）</p>
          <p id="home-week-count" style="margin-top:8px;font-size:13px">本周已学 0 天</p>
        </div>
        <div id="lesson-cards"></div>
      </section>
      <section id="view-lesson" class="view">
        <div id="lesson-flow-head"></div>
        <div id="gate-tabs" class="gate-tabs"></div>
        <div id="lesson-flow-body"></div>
      </section>
      <section id="view-review" class="view">
        <p class="hint">错题第 1/3/7 天提醒</p>
        <p class="hint" id="review-empty" hidden>暂无待复习</p>
        <ul id="review-list" style="list-style:none;padding:0"></ul>
      </section>
      <section id="view-me" class="view">
        <h3 class="section-title">近 7 天学习</h3>
        <div class="heatmap" id="heatmap"></div>
        <h3 class="section-title">三关进度</h3>
        <div id="parent-progress"></div>
        <h3 class="section-title">薄弱 TOP3</h3>
        <ul id="weak-top3" style="padding-left:18px"></ul>
        <button type="button" class="btn ghost" id="btn-clear-mvp" style="width:100%;margin-top:16px">清空记录</button>
      </section>
    </main>
    <div id="review-modal" class="gn-modal" hidden></div>
    <nav class="bottom-nav">
      <button type="button" class="nav-item active" data-view="home"><span class="nav-icon">🏠</span><span>首页</span></button>
      <button type="button" class="nav-item" data-view="review"><span class="nav-icon">📝</span><span>复习</span><span class="nav-badge" id="review-badge" hidden>0</span></button>
      <button type="button" class="nav-item" data-view="me"><span class="nav-icon">👤</span><span>我的</span></button>
    </nav>
  </div>
  <script src="../../js/data/lessons-mvp.js"></script>
  <script src="../../js/ruby-render.js"></script>
  <script src="../../js/mvp-storage.js"></script>
  <script src="../../js/speech-engine.js"></script>
  <script src="../../js/grammar-network.js"></script>
  <script src="../../js/dialogue-gate.js"></script>
  <script src="../../js/quiz-gate.js"></script>
  <script src="../../js/app.js"></script>
</body>
</html>
