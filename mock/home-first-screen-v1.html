<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1" />
  <title>首页首屏 · 美工初稿 v1</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #37474f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      font-family: "Hiragino Sans", "Yu Gothic UI", "Microsoft YaHei", system-ui, sans-serif;
    }
    .meta {
      color: #b0bec5;
      font-size: 12px;
      margin-bottom: 10px;
      text-align: center;
      max-width: 390px;
      line-height: 1.5;
    }
    .meta strong { color: #80cbc4; }
    .phone {
      width: 390px;
      height: 844px;
      border-radius: 28px;
      overflow: hidden;
      background: #fafafa;
      box-shadow: 0 24px 60px rgba(0,0,0,.45);
      display: flex;
      flex-direction: column;
      position: relative;
    }
    /* —— 顶栏 —— */
    .top-bar {
      flex: 0 0 auto;
      height: 48px;
      padding: 0 12px 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, #fff 0%, #fff8f7 100%);
      border-bottom: 1px solid #ffccbc;
    }
    .top-bar h1 {
      font-size: 15px;
      font-weight: 800;
      color: #37474f;
      letter-spacing: .02em;
    }
    .top-actions { display: flex; gap: 6px; }
    .icon-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: 1px solid #eceff1;
      background: #fff;
      display: grid; place-items: center;
      color: #78909c;
      font-size: 14px;
    }
    /* —— 主区可滚 —— */
    .main-scroll {
      flex: 1 1 auto;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .journey-head {
      flex: 0 0 auto;
      padding: 8px 14px 4px;
      background: #fff;
    }
    .tagline {
      font-size: 13px;
      font-weight: 700;
      color: #455a64;
    }
    .progress-line {
      font-size: 11px;
      color: #78909c;
      margin-top: 2px;
    }
    /* 00 入門 */
    .part0 {
      margin: 6px 12px 0;
      padding: 10px 12px;
      border-radius: 12px;
      border: 2px solid #d1c4e9;
      background: linear-gradient(152deg,#ede7f6 0%,#f3e5f5 55%,#faf8fc 100%);
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 0 0 0 rgba(142,110,192,.4);
      animation: pulse-start 2s ease-in-out infinite;
    }
    @keyframes pulse-start {
      0%, 100% { box-shadow: 0 0 0 0 rgba(142,110,192,.35); }
      50% { box-shadow: 0 0 0 6px rgba(142,110,192,0); }
    }
    .part0-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid #b39ddb;
      display: grid; place-items: center;
      font-size: 15px;
      font-weight: 700;
      color: #7e57c2;
    }
    .part0-badge {
      font-size: 9px;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 6px;
      background: #ff7043;
      color: #fff;
    }
    .part0-text { flex: 1; min-width: 0; }
    .part0-title {
      display: block;
      font-size: 14px;
      font-weight: 800;
      color: #4527a0;
    }
    .part0-desc {
      display: block;
      font-size: 11px;
      color: #607d8b;
      margin-top: 2px;
    }
    /* 地图 */
    .map-wrap {
      flex: 0 0 auto;
      margin: 8px 12px 0;
      height: 22dvh;
      max-height: 185px;
      min-height: 150px;
      border-radius: 14px;
      background: linear-gradient(180deg,#f5f5f5 0%,#eceff1 100%);
      border: 1px solid #e0e0e0;
      position: relative;
      overflow: hidden;
    }
    .map-svg {
      width: 100%;
      height: 72%;
      display: block;
    }
    .japan-land { fill: #cfd8dc; stroke: #b0bec5; stroke-width: .8; }
    .track {
      fill: none;
      stroke: #c9a227;
      stroke-width: 2.2;
      stroke-dasharray: 6 5;
      stroke-linecap: round;
    }
    .station {
      position: absolute;
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid #fff;
      transform: translate(-50%, -50%);
      font-size: 8px;
      font-weight: 800;
      display: grid; place-items: center;
      color: #fff;
    }
    .station--dormant { background: #b0bec5; }
    .station--active { background: #e57373; box-shadow: 0 0 0 3px rgba(229,115,115,.35); }
    .station--cleared { background: #66bb6a; }
    .station--start { background: #ff7043; animation: pulse-start 2s ease-in-out infinite; }
    .s1 { left: 72%; top: 78%; }
    .s2 { left: 22%; top: 72%; }
    .s3 { left: 48%; top: 52%; }
    .s4 { left: 58%; top: 38%; }
    .s5 { left: 42%; top: 24%; }
    .s6 { left: 52%; top: 10%; }
    .map-legend {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 6px 8px;
      font-size: 9px;
      color: #607d8b;
      background: rgba(255,255,255,.88);
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      align-items: center;
    }
    .leg { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 2px; vertical-align: middle; }
    .leg--cleared { background: #66bb6a; }
    .leg--active { background: #e57373; }
    .leg--start { background: #ff7043; }
    .leg--dormant { background: #b0bec5; }
    .legend-sep { color: #cfd8dc; }
    .legend-nav { margin-left: auto; display: flex; gap: 8px; opacity: .85; }
    .nav-ico { width: 14px; height: 14px; stroke: #546e7a; fill: none; stroke-width: 1.6; }
    /* 目录 */
    .catalog {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 8px 10px 12px;
      -webkit-overflow-scrolling: touch;
    }
    .unit {
      border-radius: 12px;
      margin-bottom: 8px;
      border: 1px solid #ffcdd2;
      border-left: 4px solid #e57373;
      background: linear-gradient(152deg,#ffebee 0%,#fff5f5 55%,#fffaf9 100%);
      overflow: hidden;
    }
    .unit--collapsed {
      border-left-color: #ffe0b2;
      border-color: #ffe0b2;
      background: linear-gradient(152deg,#fff3e0 0%,#fff8f0 100%);
      opacity: .92;
    }
    .unit-summary {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 10px 10px 8px;
      min-height: 52px;
      cursor: default;
    }
    .chevron {
      width: 20px;
      text-align: center;
      color: #78909c;
      font-size: 12px;
      flex-shrink: 0;
    }
    .unit.open .chevron { transform: rotate(0deg); }
    .unit--collapsed .chevron { transform: rotate(-90deg); }
    .unit-titles { flex: 1; min-width: 0; }
    .unit-line1 {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .spectrum {
      font-size: 10px;
      font-weight: 800;
      color: #c62828;
      background: rgba(229,115,115,.15);
      padding: 1px 5px;
      border-radius: 4px;
    }
    .unit--collapsed .spectrum { color: #ef6c00; background: rgba(255,183,77,.2); }
    .unit-ja {
      font-size: 15px;
      font-weight: 800;
      color: #263238;
    }
    .unit-zh {
      display: block;
      font-size: 11px;
      color: #607d8b;
      margin-top: 3px;
      line-height: 1.3;
    }
    .unit-end {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .unit-stars {
      font-size: 13px;
      letter-spacing: 1px;
      color: #ffb300;
    }
    .unit-stars .dim { color: #cfd8dc; }
    .eye-btn {
      width: 32px; height: 32px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #cfd8dc;
      font-size: 16px;
    }
    .pill-start {
      font-size: 9px;
      font-weight: 800;
      padding: 3px 7px;
      border-radius: 8px;
      background: #ff7043;
      color: #fff;
    }
    .unit--collapsed .pill-start { display: none; }
    .unit-body { padding: 0 8px 10px; }
    .lesson {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px;
      margin-bottom: 6px;
      border: none;
      border-radius: 10px;
      background: #fff;
      text-align: left;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .lesson--here {
      outline: 2px solid #e57373;
      outline-offset: -1px;
    }
    .lesson-badge {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #ffcdd2;
      color: #c62828;
      font-size: 13px;
      font-weight: 800;
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .lesson-body { flex: 1; min-width: 0; }
    .lesson-zh {
      display: block;
      font-size: 10px;
      color: #90a4ae;
      margin-bottom: 2px;
    }
    .lesson-ja {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: #263238;
    }
    .lesson-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      font-size: 10px;
      color: #78909c;
    }
    .lesson-stars { color: #ffb300; letter-spacing: 1px; }
    .lesson-stars .dim { color: #e0e0e0; }
    .now-here {
      font-size: 9px;
      font-weight: 800;
      color: #fff;
      background: #e57373;
      padding: 2px 6px;
      border-radius: 6px;
    }
    .egg {
      width: 40px; height: 40px;
      border-radius: 8px;
      background: #eceff1;
      flex-shrink: 0;
      filter: grayscale(1);
      opacity: .55;
      display: grid; place-items: center;
      font-size: 18px;
    }
    .collapsed-line {
      padding: 12px 12px 12px 36px;
      font-size: 13px;
      font-weight: 700;
      color: #546e7a;
    }
    .collapsed-line span {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: #90a4ae;
      margin-top: 2px;
    }
    /* 底栏 */
    .bottom-nav {
      flex: 0 0 auto;
      height: 56px;
      padding-bottom: env(safe-area-inset-bottom, 0);
      display: flex;
      border-top: 1px solid #eceff1;
      background: #fff;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      font-size: 10px;
      color: #90a4ae;
      text-decoration: none;
    }
    .nav-item.is-active { color: #e57373; font-weight: 700; }
    .draft-badge {
      position: absolute;
      top: 56px;
      right: 8px;
      font-size: 9px;
      font-weight: 800;
      color: #fff;
      background: rgba(55,71,79,.75);
      padding: 4px 8px;
      border-radius: 6px;
      z-index: 5;
    }
  </style>
</head>
<body>
  <p class="meta"><strong>美工初稿 v1</strong> · 仅讨论 · 非生产页 · 场景：新学员首屏 · 对照纪要 17</p>
  <div class="phone" role="img" aria-label="首页首屏美工初稿">
    <span class="draft-badge">MOCK v1</span>
    <header class="top-bar">
      <h1>日语初级课后练习</h1>
      <div class="top-actions">
        <span class="icon-btn" aria-hidden="true">📤</span>
        <span class="icon-btn" aria-hidden="true">▣</span>
      </div>
    </header>
    <div class="main-scroll">
      <div class="journey-head">
        <p class="tagline">学習の道 · 新幹線 24 駅</p>
        <p class="progress-line">進捗 0/25 · 第1課</p>
      </div>
      <a class="part0" href="#">
        <span class="part0-icon">あ</span>
        <span class="part0-badge">START</span>
        <span class="part0-text">
          <span class="part0-title">注音 · 入門 · 発音と文字</span>
          <span class="part0-desc">第一步 · 发音与文字</span>
        </span>
      </a>
      <div class="map-wrap">
        <svg class="map-svg" viewBox="0 0 200 160" aria-hidden="true">
          <path class="japan-land" d="M 95 18 L 155 22 L 168 75 L 160 130 L 110 138 L 85 95 L 88 50 Z"/>
          <path class="japan-land" d="M 12 118 L 55 112 L 62 145 L 28 152 L 8 135 Z"/>
          <path class="japan-land" d="M 78 125 L 175 118 L 188 148 L 130 158 L 82 150 Z"/>
          <path class="track" d="M 145 142 Q 100 110 55 125 Q 35 95 95 35"/>
        </svg>
        <span class="station station--start s1" title="00">0</span>
        <span class="station station--active s2">1</span>
        <span class="station station--dormant s3">2</span>
        <span class="station station--dormant s4">3</span>
        <span class="station station--dormant s5">4</span>
        <span class="station station--dormant s6">5</span>
        <div class="map-legend">
          <span><i class="leg leg--cleared"></i>通関</span>
          <span><i class="leg leg--active"></i>進行</span>
          <span><i class="leg leg--start"></i>START</span>
          <span><i class="leg leg--dormant"></i>未解锁</span>
          <span class="legend-sep">|</span>
          <span>○☆★ 四关</span>
          <span class="legend-nav" aria-hidden="true">
            <svg class="nav-ico" viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h10v2H4zm0 5h16v2H4z"/></svg>
            <svg class="nav-ico" viewBox="0 0 24 24"><circle cx="12" cy="8" r="3"/><path d="M6 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>
            <svg class="nav-ico" viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="2"/><text x="12" y="16" text-anchor="middle" font-size="9" fill="#546e7a" stroke="none">あ</text></svg>
          </span>
        </div>
      </div>
      <div class="catalog">
        <div class="unit open">
          <div class="unit-summary">
            <span class="chevron">▾</span>
            <div class="unit-titles">
              <div class="unit-line1">
                <span class="spectrum">赤</span>
                <span class="unit-ja">第1单元</span>
              </div>
              <span class="unit-zh">小李赴日</span>
            </div>
            <div class="unit-end">
              <span class="unit-stars" aria-label="0/4课通关">★<span class="dim">○○○</span></span>
              <button type="button" class="eye-btn" disabled aria-label="单元条带未解锁">👁</button>
              <span class="pill-start">START</span>
            </div>
          </div>
          <div class="unit-body">
            <button type="button" class="lesson lesson--here">
              <span class="lesson-badge">1</span>
              <span class="lesson-body">
                <span class="lesson-zh">自我介绍</span>
                <span class="lesson-ja">自己紹介</span>
                <span class="lesson-meta">
                  <span class="now-here">いまここ</span>
                  <span class="lesson-stars">☆<span class="dim">○○○</span></span>
                  <span>進行中</span>
                </span>
              </span>
              <span class="egg" aria-hidden="true">🖼</span>
            </button>
            <button type="button" class="lesson">
              <span class="lesson-badge">2</span>
              <span class="lesson-body">
                <span class="lesson-zh">介绍他人</span>
                <span class="lesson-ja">紹介</span>
                <span class="lesson-meta">
                  <span class="lesson-stars"><span class="dim">○○○○</span></span>
                  <span>未開啟</span>
                </span>
              </span>
              <span class="egg" aria-hidden="true">🖼</span>
            </button>
            <button type="button" class="lesson">
              <span class="lesson-badge">3</span>
              <span class="lesson-body">
                <span class="lesson-zh">物品</span>
                <span class="lesson-ja">もの</span>
                <span class="lesson-meta">
                  <span class="lesson-stars"><span class="dim">○○○○</span></span>
                  <span>未開啟</span>
                </span>
              </span>
              <span class="egg" aria-hidden="true">🖼</span>
            </button>
            <button type="button" class="lesson">
              <span class="lesson-badge">4</span>
              <span class="lesson-body">
                <span class="lesson-zh">处所</span>
                <span class="lesson-ja">ところ</span>
                <span class="lesson-meta">
                  <span class="lesson-stars"><span class="dim">○○○○</span></span>
                  <span>未開啟</span>
                </span>
              </span>
              <span class="egg" aria-hidden="true">🖼</span>
            </button>
          </div>
        </div>
        <div class="unit unit--collapsed">
          <div class="unit-summary">
            <span class="chevron">▸</span>
            <div class="unit-titles">
              <div class="unit-line1">
                <span class="spectrum">橙</span>
                <span class="unit-ja">第2单元</span>
              </div>
              <span class="unit-zh">公司生活①</span>
            </div>
            <div class="unit-end">
              <span class="unit-stars"><span class="dim">○○○○</span></span>
              <button type="button" class="eye-btn" disabled>👁</button>
            </div>
          </div>
        </div>
        <div class="unit unit--collapsed">
          <div class="collapsed-line">第3单元<span>箱根旅行</span></div>
        </div>
        <div class="unit unit--collapsed">
          <div class="collapsed-line">第4单元<span>公司生活②</span></div>
        </div>
      </div>
    </div>
    <nav class="bottom-nav" aria-label="底栏">
      <span class="nav-item is-active">
        <svg class="nav-ico" width="22" height="22" viewBox="0 0 24 24" style="stroke:#e57373"><path d="M6 4h12a1 1 0 011 1v14l-4-2.5L11 19V5a1 1 0 011-1z" fill="none" stroke-width="1.8"/></svg>
        课程
      </span>
      <span class="nav-item">
        <svg class="nav-ico" width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c0-4 3.1-7 7-7s7 3 7 7"/></svg>
        我的
      </span>
      <a class="nav-item" href="#">
        <svg class="nav-ico" width="22" height="22" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="3"/><text x="12" y="16" text-anchor="middle" font-size="10" fill="#78909c" stroke="none">あ</text></svg>
        五十音
      </a>
    </nav>
  </div>
</body>
</html>
