<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>日语学习小程序（离线版）</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7fb;
        --panel: rgba(0, 0, 0, 0.03);
        --border: rgba(0, 0, 0, 0.12);
        --text: rgba(0, 0, 0, 0.92);
        --muted: rgba(0, 0, 0, 0.62);
        --danger: #ff5c77;
        --ok: #33d17a;
        --warn: #ffb020;
        --btn: rgba(0, 0, 0, 0.04);
        --btnHover: rgba(0, 0, 0, 0.08);
        --shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
        --radius: 14px;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        --sans: "Segoe UI", "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans JP", "Noto Sans", Arial, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      body {
        margin: 0;
        font-family: var(--sans);
        font-synthesis: none;
        background: radial-gradient(1200px 600px at 20% 10%, rgba(120, 90, 255, 0.18), transparent 55%),
          radial-gradient(900px 500px at 80% 20%, rgba(45, 210, 170, 0.12), transparent 55%),
          radial-gradient(900px 700px at 60% 90%, rgba(255, 170, 60, 0.10), transparent 55%),
          var(--bg);
        color: var(--text);
      }
      a {
        color: inherit;
      }
      .wrap {
        max-width: 980px;
        padding: 18px 14px 60px;
        margin: 0 auto;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 14px;
      }
      .title {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .title h1 {
        font-size: 18px;
        margin: 0;
        letter-spacing: 0.2px;
      }
      .subtitle {
        font-size: 12px;
        color: var(--muted);
      }
      .row {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 12px;
      }
      @media (max-width: 860px) {
        .row {
          grid-template-columns: 1fr;
        }
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .panelHeader {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 12px;
        border-bottom: 1px solid var(--border);
        gap: 8px;
      }
      .panelHeader h2 {
        margin: 0;
        font-size: 14px;
        letter-spacing: 0.2px;
      }
      .panelBody {
        padding: 12px;
      }
      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      input[type="text"],
      textarea,
      select {
        width: 100%;
        padding: 10px 10px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.02);
        color: var(--text);
        outline: none;
        font-size: 13px;
      }
      textarea {
        resize: vertical;
        min-height: 86px;
      }
      .grid2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      @media (max-width: 560px) {
        .grid2 {
          grid-template-columns: 1fr;
        }
      }
      .btns {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      button {
        cursor: pointer;
        border: 1px solid var(--border);
        background: var(--btn);
        color: var(--text);
        padding: 9px 12px;
        border-radius: 12px;
        font-size: 13px;
        transition: background 120ms ease;
      }
      button:hover {
        background: var(--btnHover);
      }
      button.primary {
        border-color: rgba(120, 90, 255, 0.55);
        background: rgba(120, 90, 255, 0.18);
      }
      button.danger {
        border-color: rgba(255, 92, 119, 0.55);
        background: rgba(255, 92, 119, 0.12);
      }
      button.ok {
        border-color: rgba(51, 209, 122, 0.55);
        background: rgba(51, 209, 122, 0.12);
      }
      button.warn {
        border-color: rgba(255, 176, 32, 0.55);
        background: rgba(255, 176, 32, 0.12);
      }
      .muted {
        color: var(--muted);
      }
      .pill {
        font-family: var(--mono);
        font-size: 11px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.03);
        padding: 5px 8px;
        border-radius: 999px;
        color: var(--muted);
      }
      .stats {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }
      .listTop {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }
      .search {
        flex: 1;
        min-width: 220px;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .search input {
        flex: 1;
      }
      .cards {
        display: grid;
        gap: 10px;
      }
      .cardItem {
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.02);
        border-radius: 14px;
        padding: 10px 10px;
        display: grid;
        gap: 8px;
      }
      .cardTop {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
      }
      .jp {
        font-size: 15px;
        line-height: 1.35;
        letter-spacing: 0.2px;
        word-break: break-word;
      }
      .cn {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.4;
        word-break: break-word;
      }
      .meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .meta small {
        color: var(--muted);
      }
      .meta small strong {
        color: var(--text);
        font-weight: 600;
      }
      .itemBtns {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .quizBox {
        display: grid;
        gap: 10px;
      }
      .bigCard {
        border: 1px solid var(--border);
        border-radius: 16px;
        background: rgba(0, 0, 0, 0.02);
        padding: 14px;
        min-height: 160px;
        display: grid;
        align-content: center;
        justify-items: center;
        gap: 10px;
      }
      .bigFront {
        font-size: 22px;
        letter-spacing: 0.4px;
        text-align: center;
        word-break: break-word;
      }
      .bigBack {
        font-size: 15px;
        color: var(--muted);
        text-align: center;
        word-break: break-word;
      }
      .tip {
        font-size: 12px;
        color: var(--muted);
      }
      footer {
        margin-top: 12px;
        font-size: 12px;
        color: var(--muted);
      }
      .hidden {
        display: none !important;
      }
      .fileInput {
        display: none;
      }
      .toast {
        position: fixed;
        left: 50%;
        bottom: 16px;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.65);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.16);
        padding: 10px 12px;
        border-radius: 999px;
        font-size: 12px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 160ms ease, transform 160ms ease;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(-4px);
      }

      .deviceStage {
        min-height: 100svh;
        padding: 18px 12px 26px;
        display: grid;
        place-items: center;
      }
      .device {
        width: min(430px, 100%);
        height: min(920px, 100svh - 44px);
        border-radius: 44px;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.92), rgba(0, 0, 0, 0.78));
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.24);
        padding: 12px;
        position: relative;
      }
      .device::before {
        content: "";
        position: absolute;
        inset: 10px;
        border-radius: 38px;
        pointer-events: none;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.10), inset 0 0 0 2px rgba(0, 0, 0, 0.35);
      }
      .deviceBezel {
        height: 100%;
        border-radius: 36px;
        background: #000;
        overflow: hidden;
        position: relative;
      }
      .deviceNotch {
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 168px;
        height: 28px;
        border-radius: 0 0 18px 18px;
        background: rgba(0, 0, 0, 0.92);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
        z-index: 4;
        display: grid;
        place-items: center;
      }
      .deviceNotchInner {
        display: flex;
        align-items: center;
        gap: 10px;
        opacity: 0.9;
      }
      .deviceSpeaker {
        width: 56px;
        height: 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.18);
      }
      .deviceCamera {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: radial-gradient(circle at 30% 30%, rgba(120, 170, 255, 0.75), rgba(70, 90, 140, 0.22) 60%, rgba(255, 255, 255, 0.08));
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.08);
      }
      .deviceStatus {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 44px;
        padding: 10px 16px 0;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        z-index: 3;
        pointer-events: none;
      }
      .deviceTime {
        font-family: var(--sans);
        font-size: 12px;
        color: rgba(255, 255, 255, 0.92);
        letter-spacing: 0.2px;
      }
      .deviceIcons {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .deviceSignal {
        width: 18px;
        height: 12px;
        display: grid;
        grid-auto-flow: column;
        gap: 2px;
        align-items: end;
      }
      .deviceSignal span {
        width: 3px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.86);
      }
      .deviceSignal span:nth-child(1) {
        height: 4px;
        opacity: 0.55;
      }
      .deviceSignal span:nth-child(2) {
        height: 6px;
        opacity: 0.7;
      }
      .deviceSignal span:nth-child(3) {
        height: 8px;
        opacity: 0.85;
      }
      .deviceSignal span:nth-child(4) {
        height: 10px;
      }
      .deviceWifi {
        width: 16px;
        height: 12px;
        border: 2px solid rgba(255, 255, 255, 0.86);
        border-color: rgba(255, 255, 255, 0.86) transparent transparent transparent;
        border-radius: 50%;
        transform: translateY(1px);
        position: relative;
      }
      .deviceWifi::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -2px;
        transform: translateX(-50%);
        width: 4px;
        height: 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.86);
      }
      .deviceBattery {
        width: 22px;
        height: 11px;
        border-radius: 3px;
        border: 2px solid rgba(255, 255, 255, 0.86);
        position: relative;
      }
      .deviceBattery::after {
        content: "";
        position: absolute;
        right: -4px;
        top: 50%;
        transform: translateY(-50%);
        width: 3px;
        height: 7px;
        border-radius: 1px;
        background: rgba(255, 255, 255, 0.86);
      }
      .deviceBatteryFill {
        position: absolute;
        left: 1px;
        top: 1px;
        bottom: 1px;
        width: 68%;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.86);
      }
      .deviceScreen {
        position: absolute;
        inset: 0;
        background: var(--bg);
      }
      .deviceScroll {
        position: absolute;
        inset: 0;
        overflow: auto;
        -webkit-overflow-scrolling: touch;
        padding-top: 44px;
        padding-bottom: 22px;
      }
      .deviceHome {
        position: absolute;
        left: 50%;
        bottom: 10px;
        transform: translateX(-50%);
        width: 128px;
        height: 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.42);
        z-index: 5;
        pointer-events: none;
      }
      @media (min-width: 720px) {
        .wrap {
          max-width: 100%;
          padding: 16px 12px 60px;
        }
        .toast {
          position: absolute;
          left: 50%;
          bottom: 22px;
        }
      }
      @media (max-width: 719px) {
        .deviceStage {
          padding: 0;
          place-items: stretch;
        }
        .device {
          width: 100%;
          height: auto;
          border-radius: 0;
          padding: 0;
          background: transparent;
          box-shadow: none;
        }
        .device::before {
          display: none;
        }
        .deviceBezel {
          border-radius: 0;
        }
        .deviceNotch,
        .deviceStatus,
        .deviceHome {
          display: none;
        }
        .deviceScreen {
          position: static;
          inset: auto;
        }
        .deviceScroll {
          position: static;
          inset: auto;
          padding-top: 0;
          padding-bottom: 0;
          overflow: visible;
        }
      }
    </style>
  </head>
  <body>
    <div class="deviceStage">
      <div class="device">
        <div class="deviceBezel">
          <div class="deviceScreen">
            <div class="deviceNotch">
              <div class="deviceNotchInner">
                <div class="deviceSpeaker"></div>
                <div class="deviceCamera"></div>
              </div>
            </div>
            <div class="deviceStatus" aria-hidden="true">
              <div class="deviceTime" id="deviceTime">9:41</div>
              <div class="deviceIcons">
                <div class="deviceSignal" aria-hidden="true">
                  <span></span><span></span><span></span><span></span>
                </div>
                <div class="deviceWifi" aria-hidden="true"></div>
                <div class="deviceBattery" aria-hidden="true"><div class="deviceBatteryFill"></div></div>
              </div>
            </div>
            <div class="deviceScroll">
              <div class="wrap">
      <header>
        <div class="title">
          <h1>日语学习小程序（离线版）</h1>
          <div class="subtitle">无需安装、无需联网：双击打开即可用；支持导入/导出，方便分享给别人</div>
        </div>
        <div class="stats">
          <span class="pill" id="pillTotal">0 张</span>
          <span class="pill" id="pillDue">今日待复习 0</span>
        </div>
      </header>

      <div class="row">
        <section class="panel">
          <div class="panelHeader">
            <h2>1) 添加/编辑卡片</h2>
            <span class="pill" id="pillMode">添加模式</span>
          </div>
          <div class="panelBody">
            <div class="grid2">
              <div>
                <label for="jpInput">日语（例：食べる）</label>
                <input id="jpInput" type="text" autocomplete="off" placeholder="输入日语词/句" />
              </div>
              <div>
                <label for="readingInput">假名/读音（可选，例：たべる）</label>
                <input id="readingInput" type="text" autocomplete="off" placeholder="可不填" />
              </div>
            </div>
            <div style="margin-top: 10px">
              <label for="cnInput">中文/解释（例：吃）</label>
              <textarea id="cnInput" placeholder="输入中文解释、例句、备注均可"></textarea>
            </div>
            <div class="grid2" style="margin-top: 10px">
              <div>
                <label for="tagInput">标签（可选，逗号分隔：N5,动词）</label>
                <input id="tagInput" type="text" autocomplete="off" placeholder="可不填" />
              </div>
              <div>
                <label for="deckSelect">分组（可选）</label>
                <select id="deckSelect"></select>
              </div>
            </div>
            <div class="btns">
              <button class="primary" id="saveBtn">保存</button>
              <button id="clearBtn">清空输入</button>
              <button class="danger hidden" id="cancelEditBtn">退出编辑</button>
            </div>
            <footer>
              提示：数据默认保存在本机浏览器里。要分享给别人，请用“导出”生成文件发给对方，对方再“导入”即可。
            </footer>
          </div>
        </section>

        <section class="panel">
          <div class="panelHeader">
            <h2>2) 复习（抽卡）</h2>
            <span class="pill" id="pillQuiz">未开始</span>
          </div>
          <div class="panelBody">
            <div class="quizBox">
              <div class="grid2">
                <div>
                  <label for="quizMode">复习范围</label>
                  <select id="quizMode">
                    <option value="due">只复习到期</option>
                    <option value="all">随机抽全部</option>
                  </select>
                </div>
                <div>
                  <label for="quizDeck">分组过滤</label>
                  <select id="quizDeck"></select>
                </div>
              </div>
              <div class="bigCard" id="bigCard" role="button" tabindex="0" aria-label="点击翻面">
                <div class="bigFront" id="bigFront">点击“开始”</div>
                <div class="bigBack hidden" id="bigBack"></div>
                <div class="tip" id="bigTip">点击卡片可翻面</div>
              </div>
              <div class="btns">
                <button class="primary" id="startQuizBtn">开始</button>
                <button class="warn hidden" id="flipBtn">翻面</button>
                <button class="ok hidden" id="correctBtn">我会了</button>
                <button class="danger hidden" id="wrongBtn">还不会</button>
              </div>
              <div class="muted" id="quizHint" style="font-size: 12px"></div>
            </div>
          </div>
        </section>
      </div>

      <section class="panel" style="margin-top: 12px">
        <div class="panelHeader">
          <h2>3) 卡片列表 / 搜索 / 导入导出</h2>
          <div class="stats">
            <span class="pill" id="pillFiltered">显示 0</span>
          </div>
        </div>
        <div class="panelBody">
          <div class="listTop">
            <div class="search">
              <input id="searchInput" type="text" autocomplete="off" placeholder="搜索：日语/假名/中文/标签/分组" />
              <select id="filterDeck"></select>
            </div>
            <div class="btns" style="margin: 0">
              <button id="exportBtn">导出</button>
              <button id="importBtn">导入</button>
              <button class="danger" id="wipeBtn">清空全部</button>
              <input class="fileInput" id="fileInput" type="file" accept="application/json" />
            </div>
          </div>
          <div class="cards" id="cards"></div>
          <footer>
            分享方法：把这个 <span class="pill">JapaneseStudyApp.html</span> 文件发给别人即可运行；若要同步你的学习数据，请另外导出一个 JSON 文件一起发。
          </footer>
        </div>
      </section>
              </div>
            </div>
            <div class="toast" id="toast"></div>
            <div class="deviceHome" aria-hidden="true"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const STORAGE_KEY = "jp_study_app_v1";

      const $ = (id) => document.getElementById(id);

      const jpInput = $("jpInput");
      const readingInput = $("readingInput");
      const cnInput = $("cnInput");
      const tagInput = $("tagInput");
      const deckSelect = $("deckSelect");
      const saveBtn = $("saveBtn");
      const clearBtn = $("clearBtn");
      const cancelEditBtn = $("cancelEditBtn");
      const pillMode = $("pillMode");

      const quizMode = $("quizMode");
      const quizDeck = $("quizDeck");
      const startQuizBtn = $("startQuizBtn");
      const flipBtn = $("flipBtn");
      const correctBtn = $("correctBtn");
      const wrongBtn = $("wrongBtn");
      const bigCard = $("bigCard");
      const bigFront = $("bigFront");
      const bigBack = $("bigBack");
      const bigTip = $("bigTip");
      const pillQuiz = $("pillQuiz");
      const quizHint = $("quizHint");

      const searchInput = $("searchInput");
      const filterDeck = $("filterDeck");
      const exportBtn = $("exportBtn");
      const importBtn = $("importBtn");
      const wipeBtn = $("wipeBtn");
      const fileInput = $("fileInput");
      const cardsEl = $("cards");

      const pillTotal = $("pillTotal");
      const pillDue = $("pillDue");
      const pillFiltered = $("pillFiltered");
      const toastEl = $("toast");

      const nowMs = () => Date.now();
      const startOfTodayMs = () => {
        const d = new Date();
        d.setHours(0, 0, 0, 0);
        return d.getTime();
      };

      const uuid = () => {
        if (crypto?.randomUUID) return crypto.randomUUID();
        return "id_" + Math.random().toString(16).slice(2) + "_" + Date.now().toString(16);
      };

      const clamp = (n, min, max) => Math.max(min, Math.min(max, n));

      const normalizeTags = (value) =>
        value
          .split(/[,，]/g)
          .map((s) => s.trim())
          .filter(Boolean)
          .slice(0, 20);

      const defaultState = () => ({
        version: 1,
        decks: ["默认"],
        cards: []
      });

      const loadState = () => {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultState();
        try {
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object") return defaultState();
          const decks = Array.isArray(parsed.decks) ? parsed.decks.filter((d) => typeof d === "string" && d.trim()).slice(0, 200) : ["默认"];
          const cards = Array.isArray(parsed.cards) ? parsed.cards : [];
          return {
            version: 1,
            decks: decks.length ? Array.from(new Set(decks)) : ["默认"],
            cards: cards
              .filter((c) => c && typeof c === "object" && typeof c.id === "string")
              .map((c) => sanitizeCard(c))
          };
        } catch {
          return defaultState();
        }
      };

      const saveState = () => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      };

      const sanitizeCard = (c) => {
        const base = {
          id: typeof c.id === "string" ? c.id : uuid(),
          jp: typeof c.jp === "string" ? c.jp.trim() : "",
          reading: typeof c.reading === "string" ? c.reading.trim() : "",
          cn: typeof c.cn === "string" ? c.cn.trim() : "",
          tags: Array.isArray(c.tags) ? c.tags.filter((t) => typeof t === "string" && t.trim()).slice(0, 20) : [],
          deck: typeof c.deck === "string" && c.deck.trim() ? c.deck.trim() : "默认",
          createdAt: typeof c.createdAt === "number" ? c.createdAt : nowMs(),
          updatedAt: typeof c.updatedAt === "number" ? c.updatedAt : nowMs(),
          srs: normalizeSrs(c.srs)
        };
        if (!base.jp && !base.cn && !base.reading) base.jp = "(空)";
        return base;
      };

      const normalizeSrs = (srs) => {
        const base = {
          dueAt: startOfTodayMs(),
          intervalDays: 0,
          ease: 2.2,
          streak: 0,
          lapses: 0
        };
        if (!srs || typeof srs !== "object") return base;
        return {
          dueAt: typeof srs.dueAt === "number" ? srs.dueAt : base.dueAt,
          intervalDays: typeof srs.intervalDays === "number" ? clamp(Math.round(srs.intervalDays), 0, 3650) : base.intervalDays,
          ease: typeof srs.ease === "number" ? clamp(srs.ease, 1.3, 3.2) : base.ease,
          streak: typeof srs.streak === "number" ? clamp(Math.round(srs.streak), 0, 9999) : base.streak,
          lapses: typeof srs.lapses === "number" ? clamp(Math.round(srs.lapses), 0, 9999) : base.lapses
        };
      };

      const toast = (msg) => {
        toastEl.textContent = msg;
        toastEl.classList.add("show");
        window.clearTimeout(toastEl.__t);
        toastEl.__t = window.setTimeout(() => toastEl.classList.remove("show"), 1400);
      };

      let state = loadState();

      let editingId = null;
      let quizQueue = [];
      let quizIndex = -1;
      let quizShowingBack = false;

      const ensureDeck = (name) => {
        const n = (name ?? "").trim() || "默认";
        if (!state.decks.includes(n)) state.decks.push(n);
        state.decks = state.decks.filter(Boolean);
        state.decks = Array.from(new Set(state.decks));
        state.decks.sort((a, b) => a.localeCompare(b, "zh"));
        if (!state.decks.includes("默认")) state.decks.unshift("默认");
      };

      const rebuildDeckSelects = () => {
        const decks = state.decks.slice();
        const setOptions = (select, { includeAll }) => {
          select.innerHTML = "";
          if (includeAll) {
            const opt = document.createElement("option");
            opt.value = "__all__";
            opt.textContent = "全部分组";
            select.appendChild(opt);
          }
          for (const d of decks) {
            const opt = document.createElement("option");
            opt.value = d;
            opt.textContent = d;
            select.appendChild(opt);
          }
        };
        setOptions(deckSelect, { includeAll: false });
        setOptions(filterDeck, { includeAll: true });
        setOptions(quizDeck, { includeAll: true });
      };

      const setEditMode = (id) => {
        editingId = id;
        if (!id) {
          pillMode.textContent = "添加模式";
          cancelEditBtn.classList.add("hidden");
          return;
        }
        pillMode.textContent = "编辑模式";
        cancelEditBtn.classList.remove("hidden");
      };

      const clearInputs = () => {
        jpInput.value = "";
        readingInput.value = "";
        cnInput.value = "";
        tagInput.value = "";
        deckSelect.value = state.decks.includes("默认") ? "默认" : state.decks[0] ?? "默认";
      };

      const formatDue = (ms) => {
        const d = new Date(ms);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${y}-${m}-${day}`;
      };

      const computeDueCount = () => {
        const today = startOfTodayMs();
        let due = 0;
        for (const c of state.cards) {
          if ((c.srs?.dueAt ?? today) <= today) due += 1;
        }
        return due;
      };

      const updateStats = (filteredCount) => {
        pillTotal.textContent = `${state.cards.length} 张`;
        pillDue.textContent = `今日待复习 ${computeDueCount()}`;
        pillFiltered.textContent = `显示 ${filteredCount}`;
      };

      const matchText = (card, q) => {
        const hay = [
          card.jp,
          card.reading,
          card.cn,
          card.deck,
          ...(Array.isArray(card.tags) ? card.tags : [])
        ]
          .filter(Boolean)
          .join(" ")
          .toLowerCase();
        return hay.includes(q);
      };

      const getFilteredCards = () => {
        const q = (searchInput.value ?? "").trim().toLowerCase();
        const deck = filterDeck.value;
        const items = state.cards.slice().sort((a, b) => (b.updatedAt ?? 0) - (a.updatedAt ?? 0));
        return items.filter((c) => {
          const deckOk = deck === "__all__" ? true : c.deck === deck;
          const qOk = q ? matchText(c, q) : true;
          return deckOk && qOk;
        });
      };

      const renderList = () => {
        const items = getFilteredCards();
        cardsEl.innerHTML = "";
        for (const c of items) {
          const el = document.createElement("div");
          el.className = "cardItem";
          const top = document.createElement("div");
          top.className = "cardTop";
          const left = document.createElement("div");
          const jp = document.createElement("div");
          jp.className = "jp";
          jp.textContent = c.jp || "(空)";
          const cn = document.createElement("div");
          cn.className = "cn";
          cn.textContent = [c.reading ? `【${c.reading}】` : "", c.cn].filter(Boolean).join(" ");
          left.appendChild(jp);
          left.appendChild(cn);
          const right = document.createElement("div");
          right.className = "itemBtns";
          const edit = document.createElement("button");
          edit.textContent = "编辑";
          edit.addEventListener("click", () => startEdit(c.id));
          const del = document.createElement("button");
          del.textContent = "删除";
          del.className = "danger";
          del.addEventListener("click", () => deleteCard(c.id));
          right.appendChild(edit);
          right.appendChild(del);
          top.appendChild(left);
          top.appendChild(right);

          const meta = document.createElement("div");
          meta.className = "meta";
          const deck = document.createElement("span");
          deck.className = "pill";
          deck.textContent = c.deck;
          meta.appendChild(deck);
          if (c.tags?.length) {
            const t = document.createElement("small");
            t.innerHTML = `标签：<strong>${c.tags.join("，")}</strong>`;
            meta.appendChild(t);
          }
          const due = document.createElement("small");
          due.innerHTML = `下次复习：<strong>${formatDue(c.srs?.dueAt ?? startOfTodayMs())}</strong>`;
          meta.appendChild(due);
          el.appendChild(top);
          el.appendChild(meta);
          cardsEl.appendChild(el);
        }
        updateStats(items.length);
      };

      const startEdit = (id) => {
        const card = state.cards.find((c) => c.id === id);
        if (!card) return;
        jpInput.value = card.jp ?? "";
        readingInput.value = card.reading ?? "";
        cnInput.value = card.cn ?? "";
        tagInput.value = Array.isArray(card.tags) ? card.tags.join(",") : "";
        ensureDeck(card.deck);
        rebuildDeckSelects();
        deckSelect.value = card.deck;
        setEditMode(id);
        toast("已进入编辑");
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      const deleteCard = (id) => {
        const card = state.cards.find((c) => c.id === id);
        if (!card) return;
        const ok = confirm(`确定删除这张卡片吗？\n\n${card.jp}\n${card.cn}`);
        if (!ok) return;
        state.cards = state.cards.filter((c) => c.id !== id);
        if (editingId === id) {
          setEditMode(null);
          clearInputs();
        }
        saveState();
        renderList();
        toast("已删除");
      };

      const upsertCard = () => {
        const jp = (jpInput.value ?? "").trim();
        const reading = (readingInput.value ?? "").trim();
        const cn = (cnInput.value ?? "").trim();
        const deck = (deckSelect.value ?? "").trim() || "默认";
        const tags = normalizeTags(tagInput.value ?? "");

        if (!jp && !reading && !cn) {
          toast("至少填一项内容");
          return;
        }

        ensureDeck(deck);
        rebuildDeckSelects();

        const t = nowMs();
        if (!editingId) {
          const card = sanitizeCard({
            id: uuid(),
            jp,
            reading,
            cn,
            deck,
            tags,
            createdAt: t,
            updatedAt: t,
            srs: { dueAt: startOfTodayMs(), intervalDays: 0, ease: 2.2, streak: 0, lapses: 0 }
          });
          state.cards.unshift(card);
          saveState();
          renderList();
          clearInputs();
          toast("已保存");
          return;
        }

        const idx = state.cards.findIndex((c) => c.id === editingId);
        if (idx < 0) {
          setEditMode(null);
          toast("编辑目标不存在");
          return;
        }
        const old = state.cards[idx];
        state.cards[idx] = sanitizeCard({
          ...old,
          jp,
          reading,
          cn,
          deck,
          tags,
          updatedAt: t
        });
        saveState();
        renderList();
        toast("已更新");
      };

      const stopEdit = () => {
        setEditMode(null);
        clearInputs();
        toast("已退出编辑");
      };

      const getQuizCandidates = () => {
        const deck = quizDeck.value;
        const today = startOfTodayMs();
        const all = state.cards.filter((c) => (deck === "__all__" ? true : c.deck === deck));
        if (quizMode.value === "all") return all;
        return all.filter((c) => (c.srs?.dueAt ?? today) <= today);
      };

      const shuffle = (arr) => {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      };

      const setQuizUiState = ({ running }) => {
        if (!running) {
          flipBtn.classList.add("hidden");
          correctBtn.classList.add("hidden");
          wrongBtn.classList.add("hidden");
          pillQuiz.textContent = "未开始";
          quizHint.textContent = "";
          bigBack.classList.add("hidden");
          quizShowingBack = false;
          return;
        }
        flipBtn.classList.remove("hidden");
        correctBtn.classList.remove("hidden");
        wrongBtn.classList.remove("hidden");
      };

      const showQuizCard = () => {
        if (quizIndex < 0 || quizIndex >= quizQueue.length) {
          bigFront.textContent = "没有可复习的卡片";
          bigBack.textContent = "";
          bigBack.classList.add("hidden");
          bigTip.textContent = "先去添加卡片或切换复习范围";
          pillQuiz.textContent = "已结束";
          quizHint.textContent = "";
          setQuizUiState({ running: false });
          return;
        }
        const c = quizQueue[quizIndex];
        const title = [c.jp, c.reading ? `(${c.reading})` : ""].filter(Boolean).join(" ");
        bigFront.textContent = title || "(空)";
        bigBack.textContent = c.cn || "(无解释)";
        bigBack.classList.add("hidden");
        quizShowingBack = false;
        bigTip.textContent = "点击卡片可翻面";
        pillQuiz.textContent = `${quizIndex + 1}/${quizQueue.length}`;
        quizHint.textContent = `分组：${c.deck}  ·  标签：${(c.tags?.length ? c.tags.join("，") : "无")}`;
      };

      const flip = () => {
        if (quizIndex < 0) return;
        quizShowingBack = !quizShowingBack;
        if (quizShowingBack) bigBack.classList.remove("hidden");
        else bigBack.classList.add("hidden");
      };

      const schedule = (card, { correct }) => {
        const today = startOfTodayMs();
        const srs = normalizeSrs(card.srs);
        let ease = srs.ease;
        let interval = srs.intervalDays;
        let streak = srs.streak;
        let lapses = srs.lapses;

        if (correct) {
          streak += 1;
          ease = clamp(ease + 0.08, 1.3, 3.2);
          if (interval <= 0) interval = 1;
          else if (interval === 1) interval = 3;
          else interval = Math.round(interval * ease);
        } else {
          lapses += 1;
          streak = 0;
          ease = clamp(ease - 0.2, 1.3, 3.2);
          interval = 1;
        }

        const dueAt = today + interval * 24 * 60 * 60 * 1000;
        card.srs = { dueAt, intervalDays: interval, ease, streak, lapses };
        card.updatedAt = nowMs();
      };

      const answer = (correct) => {
        if (quizIndex < 0 || quizIndex >= quizQueue.length) return;
        const c = quizQueue[quizIndex];
        const real = state.cards.find((x) => x.id === c.id);
        if (real) schedule(real, { correct });
        saveState();
        renderList();
        quizIndex += 1;
        showQuizCard();
      };

      const beginQuiz = () => {
        const candidates = getQuizCandidates();
        if (candidates.length === 0) {
          quizQueue = [];
          quizIndex = -1;
          setQuizUiState({ running: false });
          showQuizCard();
          toast("没有可复习内容");
          return;
        }
        quizQueue = shuffle(candidates.slice());
        quizIndex = 0;
        setQuizUiState({ running: true });
        showQuizCard();
        toast("开始复习");
      };

      const downloadText = (filename, content) => {
        const blob = new Blob([content], { type: "application/json;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      };

      const exportData = () => {
        const payload = {
          exportedAt: new Date().toISOString(),
          app: "JapaneseStudyApp",
          version: 1,
          decks: state.decks,
          cards: state.cards
        };
        const name = `JapaneseStudyApp_${new Date().toISOString().slice(0, 10)}.json`;
        downloadText(name, JSON.stringify(payload, null, 2));
        toast("已导出");
      };

      const importDataFromFile = async (file) => {
        const text = await file.text();
        let parsed;
        try {
          parsed = JSON.parse(text);
        } catch {
          toast("导入失败：不是 JSON");
          return;
        }
        const decks = Array.isArray(parsed?.decks) ? parsed.decks : [];
        const cards = Array.isArray(parsed?.cards) ? parsed.cards : [];
        const nextState = defaultState();
        nextState.decks = Array.from(new Set(["默认", ...decks.filter((d) => typeof d === "string" && d.trim())])).slice(0, 200);
        nextState.cards = cards
          .filter((c) => c && typeof c === "object")
          .map((c) => sanitizeCard(c))
          .slice(0, 5000);
        state = nextState;
        saveState();
        rebuildDeckSelects();
        clearInputs();
        setEditMode(null);
        renderList();
        toast("已导入");
      };

      const wipeAll = () => {
        const ok = confirm("确定清空全部卡片吗？此操作不可恢复。\n\n建议先点击“导出”备份。");
        if (!ok) return;
        state = defaultState();
        saveState();
        rebuildDeckSelects();
        clearInputs();
        setEditMode(null);
        quizQueue = [];
        quizIndex = -1;
        setQuizUiState({ running: false });
        showQuizCard();
        renderList();
        toast("已清空");
      };

      saveBtn.addEventListener("click", upsertCard);
      clearBtn.addEventListener("click", () => {
        clearInputs();
        toast("已清空输入");
      });
      cancelEditBtn.addEventListener("click", stopEdit);

      searchInput.addEventListener("input", renderList);
      filterDeck.addEventListener("change", renderList);

      exportBtn.addEventListener("click", exportData);
      importBtn.addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", async () => {
        const f = fileInput.files?.[0];
        fileInput.value = "";
        if (!f) return;
        await importDataFromFile(f);
      });
      wipeBtn.addEventListener("click", wipeAll);

      startQuizBtn.addEventListener("click", beginQuiz);
      flipBtn.addEventListener("click", flip);
      correctBtn.addEventListener("click", () => answer(true));
      wrongBtn.addEventListener("click", () => answer(false));

      bigCard.addEventListener("click", flip);
      bigCard.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          flip();
        }
      });

      const init = () => {
        ensureDeck("默认");
        rebuildDeckSelects();
        deckSelect.value = "默认";
        filterDeck.value = "__all__";
        quizDeck.value = "__all__";
        renderList();
        showQuizCard();
      };

      init();

      const deviceTimeEl = document.getElementById("deviceTime");
      const updateDeviceTime = () => {
        if (!deviceTimeEl) return;
        const d = new Date();
        const hh = String(d.getHours()).padStart(2, "0");
        const mm = String(d.getMinutes()).padStart(2, "0");
        deviceTimeEl.textContent = `${hh}:${mm}`;
      };
      updateDeviceTime();
      window.setInterval(updateDeviceTime, 20_000);
    </script>
  </body>
</html>
