<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FFF8E1" />
  <title>00 入門 · 標日 あと学習</title>
  <script>
    (function () {
      if (/[?&]miniappPreview=1(?:&|$)/.test(location.search)) {
        document.documentElement.classList.add("hyouga-miniapp-webview");
      }
    })();
  </script>
  <link rel="stylesheet" href="css/design-tokens.css?v=379" />
  <link rel="stylesheet" href="css/app.css?v=379" />
  <link rel="stylesheet" href="css/mvp.css?v=379" />
  <link rel="stylesheet" href="css/hyo-top-bar.css?v=379" />
  <link rel="stylesheet" href="css/vi-typography-sweep.css?v=379" />
</head>
<body class="mvp-app intro-body">
  <script>
    if (window.self !== window.top) document.documentElement.classList.add("hyouga-embed-preview");
  </script>
  <header class="top-bar hyo-top-bar" data-hyo-view="intro">
    <h1 id="intro-page-title">00 入門</h1>
    <div class="top-actions hyo-top-bar__actions">
      <a href="index.html?v=379&nosplash=1" class="icon-btn icon-btn--svg icon-btn--home" id="intro-home-link" aria-label="回到课文首页"></a>
      <button type="button" class="icon-btn icon-btn--svg icon-btn--share" id="btn-share-wechat" aria-label="转发学习链接"></button>
      <a href="share.html" class="icon-btn icon-btn--svg" id="btn-share-page" aria-label="分享页（二维码）"></a>
    </div>
  </header>
  <main class="intro-page">
    <div class="mvp-hero intro-hero intro-hero--minimal">
      <h2>注音能力全景</h2>
      <p class="intro-hero-sub jp">発音と文字</p>
      <p class="intro-hero-hint zh-annotation">点假名看提示 · 喇叭听音</p>
    </div>
    <div id="intro-root" class="intro-root"></div>
  </main>
  <script src="js/share-wechat.js?v=379"></script>
  <script src="js/nav-icons.js?v=379"></script>
  <script>
    (function () {
      var v = typeof ShareWechat !== "undefined" && ShareWechat.CACHE_VER ? ShareWechat.CACHE_VER : "372";
      var homeQs = "index.html?v=" + encodeURIComponent(v) + "&nosplash=1";
      var home = document.getElementById("intro-home-link");
      if (home) home.href = homeQs;
      if (home && window.self !== window.top) {
        home.addEventListener("click", function (e) {
          e.preventDefault();
          window.top.location.href = homeQs + "&testcard=1&developer=1&embed=1";
        });
      }
      if (typeof NavIcons !== "undefined") {
        if (home) home.innerHTML = NavIcons.html("home");
        var copyBtn = document.getElementById("btn-share-wechat");
        var pageBtn = document.getElementById("btn-share-page");
        if (copyBtn) copyBtn.innerHTML = NavIcons.html("share");
        if (pageBtn) pageBtn.innerHTML = NavIcons.html("qrcode");
      }
      if (typeof ShareWechat !== "undefined") {
        ShareWechat.mountButton(document.getElementById("btn-share-wechat"));
      }
    })();
  </script>
  <script src="js/speech-engine.js?v=379"></script>
  <script src="js/speak-ui.js?v=379"></script>
  <script src="js/shadow-speak.js?v=379"></script>
  <script src="js/sensei-tip-card.js?v=379"></script>
  <script src="js/data/intro-content.js?v=379"></script>
  <script src="js/data/intro-kana-tips.js?v=379"></script>
  <script src="js/intro-kana-tip.js?v=379"></script>
  <script src="js/intro-guide.js?v=379"></script>
</body>
</html>
