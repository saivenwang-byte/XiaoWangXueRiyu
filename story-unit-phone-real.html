<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>竖屏真机比例 · 排版验收</title>
  <script>
    (function () {
      if (location.protocol !== "file:") return;
      var q = location.search || "?tier=l2&unit=1";
      location.replace("http://127.0.0.1:8765/story-unit-phone-real.html" + q);
    })();
  </script>
  <link rel="stylesheet" href="css/mvp.css?v=93" />
  <link rel="stylesheet" href="css/story-egg-caption.css?v=93" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #263238;
      color: #eceff1;
      font-family: system-ui, "Segoe UI", sans-serif;
      padding: 12px 12px 24px;
    }
    .page-head { max-width: 960px; margin: 0 auto 12px; }
    .page-head h1 { margin: 0 0 6px; font-size: 1.05rem; font-weight: 700; }
    .page-head p { margin: 0; font-size: 0.82rem; line-height: 1.45; color: #b0bec5; }
    .toolbar {
      max-width: 960px;
      margin: 12px auto;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .toolbar label { font-size: 0.8rem; color: #90a4ae; }
    .toolbar select,
    .toolbar button {
      font-size: 0.85rem;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid #546e7a;
      background: #37474f;
      color: #fff;
      cursor: pointer;
    }
    .toolbar button.is-on { background: #00897b; border-color: #00695c; }
    .toolbar .tier-btn.is-on { background: #5e35b1; border-color: #4527a0; }
    .layout {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    @media (min-width: 900px) {
      .layout { grid-template-columns: auto 1fr; align-items: start; }
    }
    .phone-outer { margin: 0 auto; transform-origin: top center; }
    .phone-label {
      text-align: center;
      font-size: 10px;
      color: #90a4ae;
      margin-bottom: 6px;
    }
    .phone-shell {
      padding: 12px;
      border-radius: 36px;
      background: linear-gradient(145deg, #546e7a, #263238);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      display: inline-block;
    }
    .phone-screen {
      position: relative;
      width: calc(var(--sw) * 1px);
      height: calc(var(--sh) * 1px);
      border-radius: 22px;
      overflow: hidden;
      background: #000;
    }
    .phone-sim { position: absolute; inset: 0; background: #000; }
    .phone-sim-stage {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .phone-sim-img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .phone-sim-img.is-hidden { display: none; }
    .phone-sim-close {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 8;
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: rgba(0, 0, 0, 0.4);
      color: rgba(255, 255, 255, 0.7);
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 12px;
    }
    .phone-sim-status {
      position: absolute;
      inset: 0;
      z-index: 9;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      font-size: 12px;
      color: #b0bec5;
      background: rgba(0, 0, 0, 0.75);
    }
    .phone-sim-status[hidden] { display: none; }
    .phone-sim--l1 .phone-sim-l1-sheet {
      position: absolute;
      inset: 0;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: #fff;
      padding: 28px 12px 16px;
    }
    .phone-sim--l1 .story-egg-head { margin-bottom: 8px; }
    .phone-sim--l3 .phone-sim-l3-scroll {
      position: absolute;
      inset: 0;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }
    .phone-sim-l3-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(6, minmax(52px, 1fr));
      min-height: 100%;
      background: #0a0a0a;
    }
    .phone-sim-l3-cell {
      position: relative;
      min-height: 52px;
      overflow: hidden;
    }
    .phone-sim-l3-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .open-link {
      display: inline-block;
      margin-top: 8px;
      padding: 10px 16px;
      background: #00897b;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
    }
    #server-warn {
      display: none;
      max-width: 960px;
      margin: 0 auto 12px;
      padding: 12px;
      background: #ff8a80;
      color: #3e2723;
      border-radius: 10px;
      font-size: 0.9rem;
    }
    #server-warn.is-show { display: block; }
    .metrics { font-size: 0.82rem; line-height: 1.55; color: #cfd8dc; }
    .metrics dl {
      margin: 0;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 12px;
    }
    .metrics dt { color: #90a4ae; margin: 0; }
    .metrics dd { margin: 0; font-variant-numeric: tabular-nums; }
    .metrics .ok { color: #a5d6a7; }
    .metrics .bar-wrap {
      margin-top: 12px;
      height: 22px;
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      background: #37474f;
    }
    .metrics .bar-wrap span {
      display: block;
      height: 100%;
      font-size: 9px;
      line-height: 22px;
      text-align: center;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
    }
    .bar-strip { background: #e57373; }
    .bar-pad { background: #ffca28; }
    .usable-hint {
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      background: rgba(66, 165, 245, 0.12);
      border: 1px solid rgba(66, 165, 245, 0.35);
      font-size: 0.8rem;
      color: #b3e5fc;
    }
    .metrics-hint {
      margin-top: 10px;
      font-size: 0.76rem;
      color: #90a4ae;
    }
  </style>
</head>
<body>
  <div id="server-warn">
    请用 <strong>http://127.0.0.1:8765</strong> 打开（先运行 <strong>重启本地服务.bat</strong>），不要用 file://。
  </div>

  <div class="page-head">
    <h1>竖屏真机比例 · 排版验收</h1>
    <p>
      一台浏览器验收三级彩蛋：<strong>L1 每课</strong> · <strong>L2 单元条带</strong> · <strong>L3 终结二十四景</strong>。
      默认 <strong>iPhone 14 · 390×844</strong>。叠字仅日文，左右交错。
    </p>
    <a class="open-link" id="open-link" href="http://127.0.0.1:8765/story-unit-phone-real.html?tier=l2&unit=1">打开预览</a>
  </div>

  <div class="toolbar">
    <label>层级</label>
    <button type="button" class="tier-btn" data-tier="l1">L1 每课</button>
    <button type="button" class="tier-btn is-on" data-tier="l2">L2 单元</button>
    <button type="button" class="tier-btn" data-tier="l3">L3 终结</button>
    <span style="width:8px"></span>
    <span id="unit-pick-wrap">
      <label for="unit-pick">单元</label>
      <select id="unit-pick" aria-label="选择单元">
        <option value="1">U1 小李赴日</option>
        <option value="2">U2 公司①</option>
        <option value="3">U3 箱根</option>
        <option value="4">U4 公司②</option>
        <option value="5">U5 新春</option>
        <option value="6">U6 再见</option>
      </select>
    </span>
    <span id="lesson-pick-wrap" hidden>
      <label for="lesson-pick">课</label>
      <select id="lesson-pick" aria-label="选择课次"></select>
    </span>
    <span style="width:8px"></span>
    <label>机型</label>
    <button type="button" class="device-btn is-on" data-device="iphone14">iPhone 14</button>
    <button type="button" class="device-btn" data-device="iphone14pro">14 Pro Max</button>
    <button type="button" class="device-btn" data-device="iphonese">SE 3</button>
    <button type="button" id="btn-reload">刷新测量</button>
  </div>

  <div class="layout">
    <div>
      <div class="phone-label" id="phone-label">iPhone 14 · 390 × 844 CSS px</div>
      <div class="phone-outer" id="phone-outer">
        <div class="phone-shell">
          <div class="phone-screen" id="phone-screen" style="--sw:390;--sh:844">
            <div class="phone-sim phone-sim--l2" id="phone-sim"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="metrics" id="metrics"><p>加载中…</p></div>
  </div>

  <script src="js/data/lessons-mvp.js?v=93"></script>
  <script src="js/data/lessons-mvp-depth.js?v=93"></script>
  <script src="js/lesson-recap.js?v=93"></script>
  <script src="js/data/unit-strip-storyboard.js?v=93"></script>
  <script src="js/data/curriculum-catalog.js?v=93"></script>
  <script src="js/data/grand-finale-cards.js?v=93"></script>
  <script src="js/story-caption-jp.js?v=93"></script>
  <script src="js/story-phone-preview.js?v=93"></script>
  <script>StoryPhonePreview.init();</script>
</body>
</html>
