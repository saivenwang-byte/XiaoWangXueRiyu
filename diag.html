<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>иҜҠж–ӯйЎө</title>
<style>
body { font-family: monospace; padding:16px; background:#1a1a2e; color:#e0e0e0; }
h2 { color:#4dd0e1; }
.ok { color:#81c784; }
.fail { color:#e57373; }
.warn { color:#ffb74d; }
pre { background:#16213e; padding:8px; border-radius:4px; overflow-x:auto; white-space:pre-wrap; word-break:break-all; }
</style>
</head>
<body>
<h2>иҜҠж–ӯ В· lessons-data.js v109</h2>
<div id="out"></div>

<script src="js/data/lessons-data.js?v=109"></script>
<script src="js/data/lessons-mvp.js?v=109"></script>
<script>
const out = document.getElementById('out');

function log(className, msg) {
  out.innerHTML += `<span class="${className}">${msg}</span><br>`;
}

function check(name, cond, detail) {
  if (cond) log('ok', `вң“ ${name}`);
  else log('fail', `вң— ${name} вҖ” ${detail || ''}`);
}

// 1. LESSONS_MVP exists?
check('LESSONS_MVP defined', typeof LESSONS_MVP !== 'undefined', 'зјәе°‘ lessons-data.js еҠ иҪҪ');
if (typeof LESSONS_MVP === 'undefined') { out.innerHTML += '<p class="fail">з»ҲжӯўпјҡLESSONS_MVP жңӘеҠ иҪҪ</p>'; throw new Error(); }
check('LESSONS_MVP is array', Array.isArray(LESSONS_MVP));
check('LESSONS_MVP length=24', LESSONS_MVP.length === 24, `е®һйҷ…: ${LESSONS_MVP.length}`);

// 2. Helper functions
check('getLessonMvp is function', typeof getLessonMvp === 'function');
check('getLessonVocab is function', typeof getLessonVocab === 'function');
check('getLessonDialogues is function', typeof getLessonDialogues === 'function');
check('getLessonCoachSummary is function', typeof getLessonCoachSummary === 'function');

// 3. Lesson 1 data
const l1 = getLessonMvp(1);
check('L1 exists', !!l1);
if (!l1) { out.innerHTML += '<p>жІЎжңүL1ж•°жҚ®пјҒ</p>'; } else {
  check('L1.vocab length=28', (l1.vocab||[]).length === 28, `е®һйҷ…: ${(l1.vocab||[]).length}`);
  check('L1.grammarNodes length=4', (l1.grammarNodes||[]).length === 4);
  check('L1.quizQuestions length=12', (l1.quizQuestions||[]).length === 12);
  check('L1.dialogues length=10', (l1.dialogues||[]).length === 10);
  check('L1.basicText length=4', (l1.basicText||[]).length === 4);
  check('L1.homeworkSections length=9', (l1.homeworkSections||[]).length === 9);
  
  // Show first 3 vocab items
  out.innerHTML += '<h2>L1 иҜҚжұҮпјҲеүҚ5жқЎпјү</h2><pre>';
  (l1.vocab||[]).slice(0,5).forEach(v => {
    out.innerHTML += `${v.id}: ${v.jp} [${v.pos}] ${v.meaningZh} (from=${v.from})\n`;
  });
  out.innerHTML += '</pre>';
  
  // Show grammar nodes
  out.innerHTML += '<h2>L1 иҜӯжі•иҠӮзӮ№</h2><pre>';
  (l1.grammarNodes||[]).forEach(n => {
    out.innerHTML += `${n.id}: ${n.title}\n  titleZh: ${n.titleZh}\n  example: ${(n.example||'').substring(0,40)}\n`;
  });
  out.innerHTML += '</pre>';
}

// 4. getLessonVocab return value
const vocab = getLessonVocab(1);
check('getLessonVocab(1) returns array', Array.isArray(vocab));
check('getLessonVocab(1) length', vocab.length === 28, `е®һйҷ…: ${vocab.length}`);
if (vocab.length > 0) {
  out.innerHTML += '<h2>vocabList filter test</h2><pre>';
  const filtered = vocab.filter((v) => v.from !== "grammar" && !/еҪў$|гҒҸгҒ гҒ•гҒ„$|гҒҫгҒ—гӮҮгҒҶ/.test(v.jp || ""));
  out.innerHTML += `еҺҹе§Ӣ: ${vocab.length} вҶ’ иҝҮж»ӨеҗҺ: ${filtered.length}\n`;
  if (filtered.length === 0) out.innerHTML += 'вҡ  е…ЁйғЁиў«иҝҮж»ӨжҺүдәҶпјҒжЈҖжҹҘ v.from еҖј\n';
  vocab.forEach(v => {
    const pass = v.from !== "grammar" && !/еҪў$|гҒҸгҒ гҒ•гҒ„$|гҒҫгҒ—гӮҮгҒҶ/.test(v.jp || "");
    out.innerHTML += `  ${v.id}: from="${v.from}" jp="${v.jp}" вҶ’ ${pass?'PASS':'FILTERED'}\n`;
  });
  out.innerHTML += '</pre>';
}

// 5. Check all 24 lessons
out.innerHTML += '<h2>е…ЁйғЁ24иҜҫжҰӮи§Ҳ</h2><pre>';
let ok = 0, ng = 0;
for (let lid = 1; lid <= 24; lid++) {
  const l = getLessonMvp(lid);
  if (!l) { out.innerHTML += `L${lid}: MISSING\n`; ng++; continue; }
  const v = (l.vocab||[]).length;
  const g = (l.grammarNodes||[]).length;
  const q = (l.quizQuestions||[]).length;
  const d = (l.dialogues||[]).length;
  const status = (v>0 && g>0) ? 'вң“' : 'вң—';
  if (v>0 && g>0) ok++; else ng++;
  out.innerHTML += `L${lid} ${status} vocab=${v} grammar=${g} quiz=${q} dlg=${d}\n`;
}
out.innerHTML += `\nйҖҡиҝҮ: ${ok} еӨұиҙҘ: ${ng}</pre>`;

out.innerHTML += '<h2 class="ok">иҜҠж–ӯе®ҢжҲҗ</h2>';
</script>
</body>
</html>
